name: Build Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'buildozer.spec'
      - 'main.py'
      - 'mobile_app.py'
      - 'app.py'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Configure Git
      run: |
        git config --global user.email "builder@github.com"
        git config --global user.name "GitHub Actions"
        git config --global --add safe.directory "*"

    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          openjdk-17-jdk \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo6 \
          cmake \
          libffi-dev \
          libssl-dev \
          autoconf \
          automake \
          libtool \
          pkg-config \
          unzip \
          wget \
          git

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install Cython==0.29.36
        pip install buildozer==1.5.0
        pip install kivy==2.2.1

    - name: Verify tools installation
      run: |
        echo "=== Checking installed tools ==="
        buildozer --version
        python -c "import kivy; print('Kivy version:', kivy.__version__)"
        python -c "import buildozer; print('Buildozer imported successfully')"
        which java
        java -version

    - name: Clean previous builds
      run: |
        rm -rf .buildozer
        rm -rf bin/

    - name: Initialize buildozer
      run: |
        buildozer init || echo "Buildozer already initialized"

    - name: Accept Android SDK licenses
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg
        yes | sdkmanager --licenses || true
        echo "sdk.dir=/opt/android-sdk" >> local.properties || true

    - name: Build APK (Debug)
      run: |
        export BUILDOZER_ALLOW_ROOT=1
        echo "Starting APK build..."
        buildozer android debug
      continue-on-error: false
      timeout-minutes: 60

    - name: List build artifacts
      run: |
        echo "=== Build Directory Contents ==="
        ls -la bin/ 2>/dev/null || echo "bin directory not found"
        echo "=== APK Files ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        echo "=== Build Output ==="
        ls -la .buildozer/android/platform/build/ 2>/dev/null | head -20 || echo "Build directory not accessible"

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v5
      with:
        name: task-dashboard-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v5
      with:
        name: build-logs
        path: |
          .buildozer/android/platform/python-for-android/build.log
          .buildozer/android/platform/python-for-android/*.log
        if-no-files-found: ignore
        retention-days: 7
